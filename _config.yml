title: My Blog
description: My blog
author:
  name: xoeg

remote_theme: jekyll/minima@v2.5.2

# Skin options: classic, dark, auto, solarized, solarized-light, solarized-dark
minima:
  skin: classic
  show_excerpts: true
  social_links:
    - title: GitHub
      icon: github
      url: "https://github.com/xoeg"

# MathJax (LaTeX math support)
markdown: kramdown
kramdown:
  math_engine: mathjax

plugins:
  - jekyll-remote-theme
  - jekyll-seo-tag
